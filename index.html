<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Playground Pro</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
  overflow-x: hidden;
}

/* SIDEBAR */
.sidebar {
  height: 100vh;
  background: #020617;
  padding: 20px;
  position: fixed;
  width: 220px;
}

/* CONTENT */
.main {
  margin-left: 240px;
  padding: 20px;
}

/* CARD */
.card-custom {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
}

/* BUTTON */
.copy-btn {
  background: #6366f1;
  border: none;
}

/* TOAST */
.toast-custom {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
}

.favorite {
  color: gold;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>UI Playground</h4>
  <hr>
  <p>Components</p>
  <p>Favorites</p>
</div>

<!-- MAIN -->
<div class="main">

<h2 class="mb-4">Component Gallery</h2>

<div class="row g-4">

<!-- COMPONENT -->
<div class="col-md-4">
  <div class="card-custom p-3">
    <h5>Button</h5>
    <button class="btn btn-primary mb-2">Demo</button>
    <br>
    <button class="btn copy-btn text-white" onclick="copyCode('btn')">Copy</button>
    <button class="btn btn-warning" onclick="toggleFav(this)">⭐</button>
  </div>
</div>

<!-- COMPONENT -->
<div class="col-md-4">
  <div class="card-custom p-3">
    <h5>Loader</h5>
    <div class="spinner-border text-light mb-2"></div>
    <br>
    <button class="btn copy-btn text-white" onclick="copyCode('loader')">Copy</button>
    <button class="btn btn-warning" onclick="toggleFav(this)">⭐</button>
  </div>
</div>

<!-- COMPONENT -->
<div class="col-md-4">
  <div class="card-custom p-3">
    <h5>Card</h5>
    <div class="p-2 bg-dark rounded mb-2">Sample Card</div>
    <br>
    <button class="btn copy-btn text-white" onclick="copyCode('card')">Copy</button>
    <button class="btn btn-warning" onclick="toggleFav(this)">⭐</button>
  </div>
</div>

</div>

</div>

<!-- TOAST -->
<div class="toast-custom" id="toast">Copied!</div>

<script>

/* COPY FUNCTION */
function copyCode(type){
  let code = "";

  if(type==="btn"){
    code = `<button class="btn btn-primary">Click</button>`;
  }

  if(type==="loader"){
    code = `<div class="spinner-border"></div>`;
  }

  if(type==="card"){
    code = `<div class="card p-3">Card</div>`;
  }

  navigator.clipboard.writeText(code);
  showToast("Code Copied!");
}

/* TOAST */
function showToast(msg){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },2000);
}

/* FAVORITES */
function toggleFav(btn){
  btn.classList.toggle("favorite");

  let favs = JSON.parse(localStorage.getItem("favs")) || [];
  let name = btn.parentElement.querySelector("h5").innerText;

  if(favs.includes(name)){
    favs = favs.filter(f => f !== name);
  } else {
    favs.push(name);
  }

  localStorage.setItem("favs", JSON.stringify(favs));
}

/* LOAD FAVORITES */
window.onload = () => {
  let favs = JSON.parse(localStorage.getItem("favs")) || [];

  document.querySelectorAll(".card-custom").forEach(card => {
    let name = card.querySelector("h5").innerText;
    if(favs.includes(name)){
      card.querySelector(".btn-warning").classList.add("favorite");
    }
  });

  gsap.from(".card-custom", {
    opacity: 0,
    y: 50,
    duration: 1,
    stagger: 0.2
  });
};

</script>

</body>
</html>
