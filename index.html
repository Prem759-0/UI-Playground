<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Playground Real</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  background:#020617;
  color:white;
}

/* CARD */
.card-ui {
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card-ui:hover {
  transform:scale(1.03);
}

/* PREVIEW BOX */
.preview {
  background:#0f172a;
  padding:20px;
  border-radius:10px;
  margin:10px 0;
}

/* BUTTON */
.copy-btn {
  background:#6366f1;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
}

/* TOAST */
.toast-custom {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:10px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<div class="container py-5">

<h1 class="mb-5">UI Playground Components</h1>

<div class="row g-4">

<!-- COMPONENT 1 -->
<div class="col-md-4">
  <div class="card-ui">
    <h5>Gradient Button</h5>
    <p class="text-muted">Modern animated button</p>

    <div class="preview">
      <button style="background:linear-gradient(45deg,#6366f1,#ec4899); border:none; padding:10px 20px; color:white; border-radius:20px;">
        Click Me
      </button>
    </div>

    <button class="copy-btn" onclick="copy('btn')">Copy Code</button>
  </div>
</div>

<!-- COMPONENT 2 -->
<div class="col-md-4">
  <div class="card-ui">
    <h5>Loader Spinner</h5>
    <p class="text-muted">Simple loading animation</p>

    <div class="preview">
      <div class="spinner-border text-light"></div>
    </div>

    <button class="copy-btn" onclick="copy('loader')">Copy Code</button>
  </div>
</div>

<!-- COMPONENT 3 -->
<div class="col-md-4">
  <div class="card-ui">
    <h5>Glass Card</h5>
    <p class="text-muted">Glassmorphism UI</p>

    <div class="preview">
      <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px;">
        Glass Effect
      </div>
    </div>

    <button class="copy-btn" onclick="copy('card')">Copy Code</button>
  </div>
</div>

</div>

</div>

<div class="toast-custom" id="toast">Copied!</div>

<script>

/* COPY SYSTEM */
function copy(type){
  let code = {
    btn:`<button style="background:linear-gradient(45deg,#6366f1,#ec4899); border:none; padding:10px 20px; color:white; border-radius:20px;">Click</button>`,

    loader:`<div class="spinner-border"></div>`,

    card:`<div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px;">Glass</div>`
  };

  navigator.clipboard.writeText(code[type]);
  showToast();
}

/* TOAST */
function showToast(){
  let t = document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

/* ANIMATION */
gsap.from(".card-ui", {
  opacity:0,
  y:50,
  duration:1,
  stagger:0.2
});

</script>

</body>
</html>
