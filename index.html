<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Playground</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
:root {
  --bg: #020617;
  --text: #ffffff;
}

.light {
  --bg: #f8fafc;
  --text: #020617;
}

body {
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  transition: background 0.5s, color 0.5s;
}

/* LOADER */
.loader {
  position: fixed;
  inset: 0;
  background: black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* CURSOR */
.cursor {
  width:20px;
  height:20px;
  position:fixed;
  border-radius:50%;
  background:rgba(99,102,241,0.6);
  pointer-events:none;
  transform:translate(-50%,-50%);
  filter:blur(8px);
  z-index:999;
}

/* GLASS */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

/* BLOB */
.blob {
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#6366f1,transparent);
  filter:blur(120px);
  top:20%;
  left:30%;
  z-index:-1;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal-content {
  padding:40px;
  border-radius:20px;
}

/* MAGNETIC */
.magnetic {
  transition: transform 0.2s ease;
  cursor:pointer;
}

</style>
</head>

<body class="font-sans">

<div class="loader">Loading...</div>
<div class="cursor"></div>
<div class="blob"></div>

<!-- NAV -->
<div class="fixed top-5 right-5 z-50">
  <button id="themeToggle" class="px-4 py-2 bg-indigo-500 rounded-full">
    Toggle Theme
  </button>
</div>

<!-- HERO -->
<section class="h-screen flex flex-col justify-center items-center text-center">
  <h1 class="text-5xl font-bold mb-6">UI Playground</h1>
  <p class="opacity-70 mb-10">Interactive UI Experiments</p>
</section>

<!-- GALLERY -->
<section class="p-10 grid md:grid-cols-3 gap-8">

  <div class="glass p-6 rounded-2xl magnetic demo-card">
    Click Demo 1
  </div>

  <div class="glass p-6 rounded-2xl magnetic demo-card">
    Click Demo 2
  </div>

  <div class="glass p-6 rounded-2xl magnetic demo-card">
    Click Demo 3
  </div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content glass">
    <h2 class="text-2xl mb-4">Demo Opened</h2>
    <button onclick="closeModal()" class="px-4 py-2 bg-red-500 rounded">
      Close
    </button>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* LOADER */
window.addEventListener("load", () => {
  gsap.to(".loader", {
    opacity:0,
    duration:1,
    onComplete:()=>document.querySelector(".loader").style.display="none"
  });
});

/* CURSOR */
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", (e)=>{
  gsap.to(cursor,{x:e.clientX,y:e.clientY});
});

/* CURSOR SCALE */
document.querySelectorAll(".magnetic").forEach(el=>{
  el.addEventListener("mouseenter",()=>gsap.to(cursor,{scale:2}));
  el.addEventListener("mouseleave",()=>gsap.to(cursor,{scale:1}));
});

/* MAGNETIC EFFECT */
document.querySelectorAll(".magnetic").forEach(el=>{
  el.addEventListener("mousemove",(e)=>{
    const rect = el.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2;
    const y = e.clientY - rect.top - rect.height/2;
    gsap.to(el,{x:x*0.2,y:y*0.2});
  });

  el.addEventListener("mouseleave",()=>{
    gsap.to(el,{x:0,y:0});
  });
});

/* SCROLL */
gsap.utils.toArray(".glass").forEach(el=>{
  gsap.from(el,{
    opacity:0,
    y:100,
    duration:1,
    scrollTrigger:{
      trigger:el,
      start:"top 80%"
    }
  });
});

/* PARALLAX */
gsap.to(".blob",{
  y:200,
  scrollTrigger:{scrub:true}
});

/* MODAL */
const modal = document.getElementById("modal");
document.querySelectorAll(".demo-card").forEach(card=>{
  card.addEventListener("click",()=>{
    modal.style.display="flex";
    gsap.from(".modal-content",{scale:0, duration:0.5});
  });
});

function closeModal(){
  modal.style.display="none";
}

/* THEME TOGGLE */
const toggle = document.getElementById("themeToggle");
toggle.addEventListener("click",()=>{
  document.body.classList.toggle("light");
});

/* HERO ANIMATION */
gsap.from("h1",{y:-50,opacity:0,duration:1});
gsap.from("p",{y:30,opacity:0,duration:1,delay:0.3});

</script>

</body>
</html>
