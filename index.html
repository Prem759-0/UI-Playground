<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Playground Ultra</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body {
  margin:0;
  background:#020617;
  color:white;
  overflow-x:hidden;
  font-family:sans-serif;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

/* CURSOR SPOTLIGHT */
.spotlight {
  position:fixed;
  width:300px;
  height:300px;
  background: radial-gradient(circle, rgba(99,102,241,0.4), transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:1;
}

/* TEXT REVEAL */
.reveal-text span {
  display:inline-block;
  opacity:0;
  transform:translateY(50px);
}

/* PARALLAX LAYERS */
.layer {
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  filter:blur(80px);
}

.layer1 { background:#6366f1; top:20%; left:10%; }
.layer2 { background:#ec4899; top:60%; right:10%; }

/* CARDS */
.card-adv {
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  transition:0.4s;
  backdrop-filter:blur(15px);
}

.card-adv:hover {
  transform:scale(1.05) rotate(1deg);
}

.section {
  padding:100px 20px;
}
</style>
</head>

<body>

<!-- CURSOR LIGHT -->
<div class="spotlight" id="spot"></div>

<!-- HERO -->
<section class="hero">

<div class="layer layer1"></div>
<div class="layer layer2"></div>

<h1 class="display-3 reveal-text" id="title">
  UI Playground
</h1>

<p class="mt-3 opacity-75">Next-level frontend experience</p>

</section>

<!-- COMPONENT SECTION -->
<section class="section container">
  <h2 class="mb-5">Interactive Components</h2>

  <div class="row g-4">

    <div class="col-md-4">
      <div class="card-adv">
        <h5>Hover Distortion</h5>
        <p>Premium UI effect</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card-adv">
        <h5>3D Tilt Feel</h5>
        <p>Mouse interaction</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card-adv">
        <h5>Scroll Animation</h5>
        <p>Reveal elements</p>
      </div>
    </div>

  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* SPOTLIGHT CURSOR */
const spot = document.getElementById("spot");
document.addEventListener("mousemove", e=>{
  gsap.to(spot,{x:e.clientX,y:e.clientY,duration:0.2});
});

/* TEXT REVEAL */
let chars = document.getElementById("title").innerText.split("");
let html = "";
chars.forEach(c=>{
  html += `<span>${c}</span>`;
});
document.getElementById("title").innerHTML = html;

gsap.to(".reveal-text span",{
  opacity:1,
  y:0,
  stagger:0.05,
  duration:0.8
});

/* PARALLAX */
gsap.to(".layer1",{
  y:100,
  scrollTrigger:{scrub:true}
});
gsap.to(".layer2",{
  y:-100,
  scrollTrigger:{scrub:true}
});

/* SCROLL REVEAL */
gsap.from(".card-adv",{
  opacity:0,
  y:100,
  stagger:0.2,
  scrollTrigger:{
    trigger:".card-adv",
    start:"top 80%"
  }
});

/* 3D TILT */
document.querySelectorAll(".card-adv").forEach(card=>{
  card.addEventListener("mousemove",e=>{
    let r = card.getBoundingClientRect();
    let x = (e.clientX - r.left)/r.width - 0.5;
    let y = (e.clientY - r.top)/r.height - 0.5;
    card.style.transform = `rotateX(${y*10}deg) rotateY(${x*10}deg) scale(1.05)`;
  });

  card.addEventListener("mouseleave",()=>{
    card.style.transform = "rotateX(0) rotateY(0) scale(1)";
  });
});
</script>

</body>
</html>
