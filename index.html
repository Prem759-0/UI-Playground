<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Playground SaaS</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  background:#020617;
  color:white;
  font-family:sans-serif;
}

/* GLASS */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}

/* BUTTON */
.copy-btn {
  background:#6366f1;
  padding:8px 16px;
  border-radius:8px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="flex justify-between p-5">
  <h1 class="text-xl font-bold">UI Playground</h1>
  <button onclick="openAuth()" class="copy-btn">Login</button>
</div>

<!-- HERO -->
<section class="text-center py-20">
  <h2 class="text-4xl mb-4">Component Gallery</h2>
  <p class="opacity-70">Explore & copy UI components</p>
</section>

<!-- COMPONENTS -->
<section class="grid md:grid-cols-3 gap-6 p-10">

  <div class="glass p-6 rounded-xl">
    <h3>Button UI</h3>
    <button onclick="copyCode('btn1')" class="copy-btn mt-4">Copy Code</button>
    <button onclick="fav(this)" class="ml-3">⭐</button>
  </div>

  <div class="glass p-6 rounded-xl">
    <h3>Card UI</h3>
    <button onclick="copyCode('card1')" class="copy-btn mt-4">Copy Code</button>
    <button onclick="fav(this)" class="ml-3">⭐</button>
  </div>

  <div class="glass p-6 rounded-xl">
    <h3>Loader UI</h3>
    <button onclick="copyCode('loader1')" class="copy-btn mt-4">Copy Code</button>
    <button onclick="fav(this)" class="ml-3">⭐</button>
  </div>

</section>

<!-- AUTH MODAL -->
<div class="modal" id="authModal">
  <div class="glass p-10 rounded-xl text-center">
    <h2 class="text-2xl mb-4">Login</h2>
    <input placeholder="Email" class="p-2 mb-3 w-full text-black"><br>
    <input placeholder="Password" type="password" class="p-2 mb-3 w-full text-black"><br>
    <button onclick="closeAuth()" class="copy-btn">Login</button>
  </div>
</div>

<script>

/* COPY CODE */
function copyCode(type){
  let code = "";

  if(type==="btn1"){
    code = `<button class="bg-indigo-500 px-4 py-2 rounded">Click</button>`;
  }

  if(type==="card1"){
    code = `<div class="p-4 shadow rounded">Card</div>`;
  }

  if(type==="loader1"){
    code = `<div class="animate-spin w-6 h-6 border-4 border-white border-t-transparent rounded-full"></div>`;
  }

  navigator.clipboard.writeText(code);
  alert("Code copied!");
}

/* FAVORITE */
function fav(el){
  el.style.color="yellow";
}

/* AUTH */
function openAuth(){
  document.getElementById("authModal").style.display="flex";
}

function closeAuth(){
  document.getElementById("authModal").style.display="none";
}

/* GSAP ENTRY */
gsap.from("h2",{y:-50,opacity:0,duration:1});

</script>

</body>
</html>
