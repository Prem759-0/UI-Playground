<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Playground Pro</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
}

/* Sidebar */
.sidebar {
  height: 100vh;
  background: #020617;
  padding: 20px;
  position: fixed;
  width: 220px;
}

.sidebar button {
  width: 100%;
  margin-bottom: 10px;
}

/* Main */
.main {
  margin-left: 240px;
  padding: 20px;
}

/* Cards */
.card-custom {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 15px;
}

/* Toast */
.toast-custom {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
}

/* Favorite */
.favorite {
  color: gold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>UI Playground</h4>
  <hr>

  <button class="btn btn-outline-light" onclick="filter('all')">All</button>
  <button class="btn btn-outline-light" onclick="filter('button')">Buttons</button>
  <button class="btn btn-outline-light" onclick="filter('loader')">Loaders</button>
  <button class="btn btn-outline-light" onclick="filter('card')">Cards</button>

</div>

<!-- MAIN -->
<div class="main">

<h2 class="mb-4">Component Library</h2>

<div class="row g-4" id="components">

<!-- BUTTONS -->
<div class="col-md-4 component button">
  <div class="card-custom p-3">
    <h5><i class="bi bi-hand-index"></i> Primary Button</h5>
    <button class="btn btn-primary mb-2">Click</button><br>
    <button class="btn btn-success" onclick="copyCode('btn1')">Copy</button>
    <button class="btn btn-warning" onclick="fav(this)">⭐</button>
  </div>
</div>

<div class="col-md-4 component button">
  <div class="card-custom p-3">
    <h5><i class="bi bi-lightning"></i> Gradient Button</h5>
    <button class="btn btn-dark mb-2">Hover</button><br>
    <button class="btn btn-success" onclick="copyCode('btn2')">Copy</button>
    <button class="btn btn-warning" onclick="fav(this)">⭐</button>
  </div>
</div>

<!-- LOADERS -->
<div class="col-md-4 component loader">
  <div class="card-custom p-3">
    <h5><i class="bi bi-arrow-repeat"></i> Spinner</h5>
    <div class="spinner-border text-light mb-2"></div><br>
    <button class="btn btn-success" onclick="copyCode('loader1')">Copy</button>
    <button class="btn btn-warning" onclick="fav(this)">⭐</button>
  </div>
</div>

<div class="col-md-4 component loader">
  <div class="card-custom p-3">
    <h5><i class="bi bi-circle"></i> Dot Loader</h5>
    <div class="mb-2">● ● ●</div><br>
    <button class="btn btn-success" onclick="copyCode('loader2')">Copy</button>
    <button class="btn btn-warning" onclick="fav(this)">⭐</button>
  </div>
</div>

<!-- CARDS -->
<div class="col-md-4 component card">
  <div class="card-custom p-3">
    <h5><i class="bi bi-card-text"></i> Basic Card</h5>
    <div class="bg-dark p-2 rounded mb-2">Card</div>
    <button class="btn btn-success" onclick="copyCode('card1')">Copy</button>
    <button class="btn btn-warning" onclick="fav(this)">⭐</button>
  </div>
</div>

<div class="col-md-4 component card">
  <div class="card-custom p-3">
    <h5><i class="bi bi-window"></i> Glass Card</h5>
    <div class="p-2 border rounded mb-2">Glass UI</div>
    <button class="btn btn-success" onclick="copyCode('card2')">Copy</button>
    <button class="btn btn-warning" onclick="fav(this)">⭐</button>
  </div>
</div>

<!-- EXTRA COMPONENTS -->
<div class="col-md-4 component button">
  <div class="card-custom p-3">
    <h5><i class="bi bi-toggle-on"></i> Toggle</h5>
    <input type="checkbox">
    <br><button class="btn btn-success" onclick="copyCode('toggle')">Copy</button>
  </div>
</div>

<div class="col-md-4 component card">
  <div class="card-custom p-3">
    <h5><i class="bi bi-bell"></i> Alert Box</h5>
    <div class="alert alert-warning">Warning</div>
    <button class="btn btn-success" onclick="copyCode('alert')">Copy</button>
  </div>
</div>

</div>

</div>

<!-- TOAST -->
<div class="toast-custom" id="toast">Copied</div>

<script>

/* FILTER */
function filter(type){
  let comps = document.querySelectorAll(".component");
  comps.forEach(c=>{
    if(type==="all" || c.classList.contains(type)){
      c.style.display="block";
    } else {
      c.style.display="none";
    }
  });
}

/* COPY */
function copyCode(type){
  let code = {
    btn1:`<button class="btn btn-primary">Click</button>`,
    btn2:`<button class="btn btn-dark">Hover</button>`,
    loader1:`<div class="spinner-border"></div>`,
    loader2:`<div>● ● ●</div>`,
    card1:`<div class="card p-3">Card</div>`,
    card2:`<div class="glass">Glass</div>`,
    toggle:`<input type="checkbox">`,
    alert:`<div class="alert alert-warning">Warning</div>`
  };

  navigator.clipboard.writeText(code[type]);
  showToast();
}

/* TOAST */
function showToast(){
  let t = document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

/* FAVORITE */
function fav(btn){
  btn.classList.toggle("favorite");
}

/* ANIMATION */
gsap.from(".component", {
  opacity:0,
  y:50,
  duration:1,
  stagger:0.1
});

</script>

</body>
</html>
