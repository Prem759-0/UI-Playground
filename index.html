<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Playground Advanced</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body {
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  width:220px;
  height:100vh;
  background:#020617;
  padding:20px;
}

/* MAIN */
.main {
  margin-left:240px;
  padding:20px;
}

/* CARD */
.card-custom {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:15px;
  transition:0.3s;
}

/* LIQUID HOVER */
.liquid {
  position:relative;
  overflow:hidden;
}
.liquid::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.2),transparent);
  top:-50%;
  left:-50%;
  transform:scale(0);
  transition:0.5s;
}
.liquid:hover::before {
  transform:scale(1);
}

/* GRADIENT BUTTON */
.gradient-btn {
  background: linear-gradient(45deg,#6366f1,#ec4899);
  border:none;
  color:white;
  padding:10px 20px;
  border-radius:20px;
}

/* CURSOR */
.cursor {
  width:20px;
  height:20px;
  position:fixed;
  border-radius:50%;
  background:rgba(99,102,241,0.6);
  pointer-events:none;
  transform:translate(-50%,-50%);
  filter:blur(8px);
  z-index:999;
}

/* FLOATING */
.float {
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

.toast-custom {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:10px;
  border-radius:8px;
  display:none;
}

</style>
</head>

<body>

<div class="cursor"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>UI Playground</h4>
  <hr>
  <button class="btn btn-outline-light w-100 mb-2" onclick="filter('all')">All</button>
  <button class="btn btn-outline-light w-100 mb-2" onclick="filter('advanced')">Advanced</button>
</div>

<!-- MAIN -->
<div class="main">

<h2 class="mb-4">Advanced UI Components</h2>

<div class="row g-4">

<!-- MAGNETIC BUTTON -->
<div class="col-md-4 component advanced">
  <div class="card-custom p-3 magnetic">
    <h5><i class="bi bi-mouse"></i> Magnetic Button</h5>
    <button class="btn btn-primary mb-2">Hover</button>
    <button class="btn btn-success" onclick="copyCode('magnetic')">Copy</button>
  </div>
</div>

<!-- LIQUID CARD -->
<div class="col-md-4 component advanced">
  <div class="card-custom p-3 liquid">
    <h5><i class="bi bi-water"></i> Liquid Hover</h5>
    <p>Hover effect</p>
    <button class="btn btn-success" onclick="copyCode('liquid')">Copy</button>
  </div>
</div>

<!-- GRADIENT BUTTON -->
<div class="col-md-4 component advanced">
  <div class="card-custom p-3">
    <h5><i class="bi bi-palette"></i> Gradient Button</h5>
    <button class="gradient-btn mb-2">Click</button>
    <button class="btn btn-success" onclick="copyCode('gradient')">Copy</button>
  </div>
</div>

<!-- FLOATING CARD -->
<div class="col-md-4 component advanced">
  <div class="card-custom p-3 float">
    <h5><i class="bi bi-stars"></i> Floating UI</h5>
    <p>Animated</p>
  </div>
</div>

</div>

</div>

<div class="toast-custom" id="toast">Copied</div>

<script>

gsap.registerPlugin(ScrollTrigger);

/* CURSOR */
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", e=>{
  gsap.to(cursor,{x:e.clientX,y:e.clientY});
});

/* MAGNETIC */
document.querySelectorAll(".magnetic").forEach(el=>{
  el.addEventListener("mousemove",e=>{
    let r = el.getBoundingClientRect();
    let x = e.clientX - r.left - r.width/2;
    let y = e.clientY - r.top - r.height/2;
    gsap.to(el,{x:x*0.2,y:y*0.2});
  });
  el.addEventListener("mouseleave",()=>gsap.to(el,{x:0,y:0}));
});

/* FILTER */
function filter(type){
  document.querySelectorAll(".component").forEach(el=>{
    el.style.display = (type==="all" || el.classList.contains(type)) ? "block":"none";
  });
}

/* COPY */
function copyCode(type){
  let code = {
    magnetic:`// magnetic effect JS`,
    liquid:`.liquid:hover{...}`,
    gradient:`background: linear-gradient(...)`
  };
  navigator.clipboard.writeText(code[type]);
  showToast();
}

/* TOAST */
function showToast(){
  let t=document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

/* SCROLL ANIMATION */
gsap.from(".component",{
  opacity:0,
  y:50,
  duration:1,
  stagger:0.2
});

</script>

</body>
</html>
